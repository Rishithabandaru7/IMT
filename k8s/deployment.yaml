---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: incident-app
  labels:
    app: incident-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: incident-app
  template:
    metadata:
      labels:
        app: incident-app
    spec:
      containers:
      - name: incident-app
        image: bandarurishitha/incident_app:latest
        ports:
          - containerPort: 5000
        env:
          - name: DB_HOST
            value: mysql
          - name: DB_USER
            value: root
          - name: DB_PASSWORD
            value: root@123
          - name: DB_NAME
            value: incident_db
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"

---
apiVersion: v1
kind: Service
metadata:
  name: incident-service
spec:
  type: NodePort
  selector:
    app: incident-app
  ports:
    - port: 5000
      targetPort: 5000
      nodePort: 30007